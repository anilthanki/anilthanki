<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-labelledby="title desc">
  <title id="title">Anil Thanki research statement</title>
  <desc id="desc">A dark bioinformatics graphic with a DNA helix, a network graph, and a quote about open and reproducible research.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.55" stop-color="#081c31"/>
      <stop offset="1" stop-color="#07373b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35c9ff"/>
      <stop offset="1" stop-color="#59e4b6"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#8bd5e5" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="720" height="340" rx="24" fill="url(#background)"/>
  <rect width="720" height="340" rx="24" fill="url(#grid)"/>
  <rect x="18" y="18" width="684" height="304" rx="19" fill="none" stroke="#6bdac8" stroke-opacity="0.24"/>

  <!-- DNA helix -->
  <g transform="translate(48 30)" fill="none" stroke-linecap="round" opacity="0.42">
    <path d="M24 0 C146 58, 4 160, 132 278" stroke="#35c9ff" stroke-width="5"/>
    <path d="M132 0 C10 58, 152 160, 24 278" stroke="#59e4b6" stroke-width="5"/>
    <g stroke="#c2f5f4" stroke-width="2">
      <path d="M48 18L108 18"/><path d="M65 48L91 48"/><path d="M48 79L108 79"/>
      <path d="M29 111L127 111"/><path d="M35 143L121 143"/><path d="M54 176L102 176"/>
      <path d="M63 210L93 210"/><path d="M44 244L112 244"/><path d="M28 270L128 270"/>
    </g>
  </g>

  <!-- Network graph -->
  <g transform="translate(395 28)" opacity="0.48" stroke="#8fe9e2" stroke-width="1.6">
    <path d="M0 86L74 25L138 68L207 14L272 62M74 25L103 132L180 119L252 164M138 68L103 132M138 68L180 119M207 14L180 119M180 119L252 164M103 132L52 196L130 240L220 214L294 265M52 196L130 240M130 240L220 214M220 214L252 164" fill="none"/>
    <g fill="url(#accent)" stroke="none" filter="url(#glow)">
      <circle cx="0" cy="86" r="5"/><circle cx="74" cy="25" r="7"/><circle cx="138" cy="68" r="5"/>
      <circle cx="207" cy="14" r="6"/><circle cx="272" cy="62" r="5"/><circle cx="103" cy="132" r="6"/>
      <circle cx="180" cy="119" r="7"/><circle cx="252" cy="164" r="5"/><circle cx="52" cy="196" r="5"/>
      <circle cx="130" cy="240" r="7"/><circle cx="220" cy="214" r="6"/><circle cx="294" cy="265" r="5"/>
    </g>
  </g>

  <!-- Quote panel -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
    <rect x="190" y="64" width="476" height="220" rx="18" fill="#06111f" fill-opacity="0.79" stroke="#9de9e0" stroke-opacity="0.34"/>
    <text x="220" y="118" fill="#59e4b6" font-size="56" font-weight="700">“</text>
    <text x="278" y="126" fill="#effcff" font-size="25" font-weight="600">
      <tspan x="278" dy="0">Turning biological data</tspan>
      <tspan x="278" dy="42">into knowledge through</tspan>
      <tspan x="278" dy="42">open-source software and</tspan>
      <tspan x="278" dy="42">reproducible research.</tspan>
    </text>
  </g>
</svg>
